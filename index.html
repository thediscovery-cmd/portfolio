document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

50vw;width:100vw;background:#0b1626;overflow:hidden;\">\n    <div aria-hidden=\"true\" style=\"position:absolute;inset:0;pointer-events:none;\">\n      <div style=\"position:absolute;top:-25%;left:-12%;width:65%;height:130%;background:radial-gradient(circle at 50% 50%, rgba(37,99,175,0.55), transparent 62%);filter:blur(46px);animation:auroraDrift 20s ease-in-out infinite;\"><\u002Fdiv>\n      <div style=\"position:absolute;bottom:-35%;right:-12%;width:58%;height:130%;background:radial-gradient(circle at 50% 50%, rgba(255,107,61,0.28), transparent 62%);filter:blur(55px);animation:auroraDrift 26s ease-in-out infinite reverse;\"><\u002Fdiv>\n      <div style=\"position:absolute;inset:0;background-image:linear-gradient(rgba(130,170,225,0.08) 1px,transparent 1px),linear-gradient(90deg,rgba(130,170,225,0.08) 1px,transparent 1px);background-size:46px 46px;animation:gridPan 7s linear infinite;-webkit-mask-image:radial-gradient(ellipse 85% 78% at 50% 40%, #000 42%, transparent 100%);mask-image:radial-gradient(ellipse 85% 78% at 50% 40%, #000 42%, transparent 100%);\"><\u002Fdiv>\n      <div style=\"position:absolute;inset:0;background:linear-gradient(180deg, rgba(11,22,38,0) 55%, #f4f6f9 100%);\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1120px;margin:0 auto;padding:5rem 2rem 5.5rem;position:relative;z-index:2;\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:3.5rem;align-items:center;\">\n        <div style=\"animation:heroIn 0.9s cubic-bezier(.22,.61,.36,1) both;\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:#8fb0e0;display:flex;align-items:center;gap:0.75rem;margin-bottom:1.5rem;\">\n            <span style=\"width:8px;height:8px;background:#ff6b3d;border-radius:50%;display:inline-block;animation:pulseRing 2.6s infinite;\"><\u002Fspan>\n            Senior End User Computing Engineer\n          <\u002Fdiv>\n          <h1 style=\"font-family:'Space Grotesk',sans-serif;font-size:clamp(2.4rem,5.2vw,3.7rem);line-height:1.05;font-weight:600;letter-spacing:-0.02em;color:#f5f8fc;margin-bottom:1rem;max-width:16ch;\">Modern <span style=\"color:#6ea8ff;font-weight:700;\">endpoint platforms<\u002Fspan>, built automation-first.<\u002Fh1>\n          <p style=\"font-size:1.12rem;color:#aebfd6;max-width:52ch;font-weight:300;margin-bottom:2rem;\">I take manual IT environments and turn them into automated, cloud-managed platforms — from Autopilot enrollment to runbook-driven remediation, at multi-thousand-endpoint scale.<\u002Fp>\n          <div style=\"display:flex;flex-wrap:wrap;gap:0.75rem;align-items:center;\">\n            <a href=\"#contact\" style=\"display:inline-flex;align-items:center;gap:0.5rem;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:0.95rem;letter-spacing:0.005em;color:#fff;background:#2f6fd0;padding:0.8rem 1.6rem;border-radius:7px;box-shadow:0 10px 26px rgba(47,111,208,0.38);transition:background 0.2s, transform 0.2s, box-shadow 0.2s;\" style-hover=\"background:#ff6b3d;transform:translateY(-2px);box-shadow:0 12px 30px rgba(255,107,61,0.4);\">Get in touch<\u002Fa>\n            <a href=\"#projects\" style=\"display:inline-flex;align-items:center;gap:0.5rem;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:0.95rem;letter-spacing:0.005em;color:#c7d4e6;background:transparent;border:1px solid rgba(255,255,255,0.18);padding:0.8rem 1.5rem;border-radius:7px;transition:border-color 0.2s, color 0.2s;\" style-hover=\"border-color:#6ea8ff;color:#fff;\">View projects<\u002Fa>\n          <\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:0.78rem;letter-spacing:0.06em;color:#dbe6f5;font-weight:500;display:inline-flex;align-items:center;gap:0.5rem;margin-top:1.75rem;background:rgba(11,22,38,0.72);border:1px solid rgba(255,255,255,0.12);padding:0.5rem 0.9rem;border-radius:100px;\">\n            <svg sc-camel-view-box=\"0 0 24 24\" width=\"12\" height=\"12\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" style=\"opacity:0.7;\"><path d=\"M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z\"><\u002Fpath><circle cx=\"12\" cy=\"10\" r=\"3\"><\u002Fcircle><\u002Fsvg>\n            Fitchburg, Wisconsin\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"animation:heroIn 0.9s cubic-bezier(.22,.61,.36,1) 0.15s both;background:rgba(9,18,32,0.62);border:1px solid rgba(255,255,255,0.12);border-radius:14px;padding:1.9rem;display:flex;flex-direction:column;gap:1.4rem;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 24px 60px rgba(0,0,0,0.4);\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;color:#8fb0e0;display:flex;align-items:center;gap:0.6rem;\"><span style=\"width:20px;height:1px;background:#6ea8ff;display:inline-block;\"><\u002Fspan>About<\u002Fdiv>\n          <p style=\"font-size:1rem;color:#c7d4e6;line-height:1.65;\">Five years turning helpdesk chaos into automated platforms. I build the systems that fix things before a ticket is ever opened — then hand the team the tools to run them. Every environment I touch leaves manual and returns cloud-managed, self-healing, and documented.<\u002Fp>\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:1.1rem;border-top:1px solid rgba(255,255,255,0.1);padding-top:1.4rem;\">\n            <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"4\">\n              <div>\n                <div data-count=\"{{ s.value }}\" style=\"font-family:'Space Grotesk',sans-serif;font-size:1.7rem;font-weight:700;color:#ffffff;letter-spacing:-0.01em;line-height:1;\">{{ s.value }}<\u002Fdiv>\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:0.7rem;letter-spacing:0.05em;color:#e3ecf8;font-weight:500;text-transform:uppercase;margin-top:0.4rem;\">{{ s.label }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <section id=\"capabilities\" data-reveal=\"\" style=\"padding:4.5rem 0;transition:opacity 0.7s ease-out, transform 0.7s ease-out;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:#1a4b8c;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.75rem;\"><span style=\"width:24px;height:1px;background:#1a4b8c;display:inline-block;\"><\u002Fspan>What I do<\u002Fdiv>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:clamp(1.8rem,3.4vw,2.4rem);font-weight:600;letter-spacing:-0.015em;line-height:1.15;color:#0f1e33;margin-bottom:2.5rem;max-width:26ch;\">One common thread: fewer manual steps.<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1.5rem;\">\n      <sc-for list=\"{{ caps }}\" as=\"c\" hint-placeholder-count=\"4\">\n        <div style=\"background:#fff;padding:1.75rem;border:1px solid #dde4ee;border-radius:8px;transition:border-color 0.2s, transform 0.2s;\" style-hover=\"border-color:#1a4b8c;transform:translateY(-3px);\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:#1a4b8c;letter-spacing:0.1em;margin-bottom:0.75rem;\">{{ c.num }}<\u002Fdiv>\n          <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:600;margin-bottom:0.6rem;color:#0f1e33;\">{{ c.title }}<\u002Fh3>\n          <p style=\"font-size:0.92rem;color:#34455e;line-height:1.55;\">{{ c.body }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"career\" data-reveal=\"\" style=\"padding:4.5rem 0;transition:opacity 0.7s ease-out, transform 0.7s ease-out;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:#1a4b8c;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.75rem;\"><span style=\"width:24px;height:1px;background:#1a4b8c;display:inline-block;\"><\u002Fspan>Where I've been<\u002Fdiv>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:clamp(1.8rem,3.4vw,2.4rem);font-weight:600;letter-spacing:-0.015em;line-height:1.15;color:#0f1e33;margin-bottom:2.5rem;max-width:26ch;\">Every step has demanded more — and rewarded more.<\u002Fh2>\n    <div style=\"position:relative;\">\n      <sc-for list=\"{{ stops }}\" as=\"stop\" hint-placeholder-count=\"3\">\n        <div style=\"display:flex;gap:1.75rem;\">\n          <div style=\"width:16px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;\">\n            <sc-if value=\"{{ stop.current }}\">\n              <div style=\"width:16px;height:16px;border-radius:50%;background:#1a4b8c;box-shadow:0 0 0 4px rgba(26,75,140,0.14);margin-top:5px;\"><\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ stop.past }}\">\n              <div style=\"width:16px;height:16px;border-radius:50%;background:#fff;border:2px solid #1a4b8c;margin-top:5px;\"><\u002Fdiv>\n            <\u002Fsc-if>\n            <div style=\"width:2px;flex:1;background:#dde4ee;margin-top:6px;\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;padding-bottom:2.75rem;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:0.76rem;color:#6b7a91;letter-spacing:0.04em;margin-bottom:0.5rem;\">{{ stop.when }}<\u002Fdiv>\n            <div style=\"font-family:'Space Grotesk',sans-serif;font-size:1.35rem;font-weight:600;color:#0f1e33;margin-bottom:0.2rem;letter-spacing:-0.01em;\">{{ stop.role }}<\u002Fdiv>\n            <div style=\"font-size:0.95rem;color:#1a4b8c;font-weight:500;margin-bottom:0.9rem;\">{{ stop.where }}<\u002Fdiv>\n            <div style=\"font-size:0.98rem;color:#34455e;line-height:1.65;max-width:62ch;\">{{ stop.body }}<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:1rem;\">\n              <sc-for list=\"{{ stop.tags }}\" as=\"t\" hint-placeholder-count=\"4\">\n                <span style=\"font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:#6b7a91;padding:0.25rem 0.6rem;border:1px solid #dde4ee;border-radius:100px;background:#fff;\">{{ t }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"projects\" data-reveal=\"\" style=\"padding:4.5rem 0;transition:opacity 0.7s ease-out, transform 0.7s ease-out;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:#1a4b8c;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.75rem;\"><span style=\"width:24px;height:1px;background:#1a4b8c;display:inline-block;\"><\u002Fspan>Selected projects<\u002Fdiv>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:clamp(1.8rem,3.4vw,2.4rem);font-weight:600;letter-spacing:-0.015em;line-height:1.15;color:#0f1e33;margin-bottom:2.5rem;max-width:26ch;\">Things I've shipped. Outcome first, tech underneath.<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:1.5rem;\">\n      <sc-for list=\"{{ projects }}\" as=\"p\" hint-placeholder-count=\"6\">\n        <div style=\"background:#fff;padding:1.85rem;border:1px solid #dde4ee;border-radius:8px;display:flex;flex-direction:column;transition:border-color 0.2s, transform 0.2s;position:relative;overflow:hidden;\" style-hover=\"border-color:#1a4b8c;transform:translateY(-3px);\">\n          <div style=\"position:absolute;top:1rem;right:1.2rem;font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:#c8d3e2;letter-spacing:0.05em;z-index:2;\">{{ p.num }}<\u002Fdiv>\n          <sc-if value=\"{{ p.img }}\">\n            <button sc-camel-on-click=\"{{ openLightbox }}\" data-img=\"{{ p.img }}\" data-title=\"{{ p.title }}\" style=\"display:block;width:calc(100% + 3.7rem);margin:-1.85rem -1.85rem 1.25rem;border:none;border-bottom:1px solid #dde4ee;overflow:hidden;background:#eaeef4;aspect-ratio:16/9;position:relative;cursor:zoom-in;padding:0;\">\n              <img src=\"{{ p.img }}\" alt=\"{{ p.title }} screenshot\" loading=\"lazy\" style=\"width:100%;height:100%;object-fit:cover;object-position:top center;transition:transform 0.4s ease;pointer-events:none;\" style-hover=\"transform:scale(1.03);\">\n            <\u002Fbutton>\n          <\u002Fsc-if>\n          <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:600;color:#0f1e33;margin-bottom:0.9rem;letter-spacing:-0.01em;padding-right:3rem;\">{{ p.title }}<\u002Fh3>\n          <div style=\"flex:1;display:flex;flex-direction:column;gap:0.7rem;margin-bottom:1.25rem;\">\n            <sc-for list=\"{{ p.paras }}\" as=\"para\" hint-placeholder-count=\"1\">\n              <p style=\"font-size:0.95rem;color:#34455e;line-height:1.6;\">{{ para }}<\u002Fp>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:#6b7a91;padding-top:1rem;border-top:1px solid #dde4ee;letter-spacing:0.02em;\">{{ p.stack }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"certs\" data-reveal=\"\" style=\"padding:4.5rem 0;transition:opacity 0.7s ease-out, transform 0.7s ease-out;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:#1a4b8c;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.75rem;\"><span style=\"width:24px;height:1px;background:#1a4b8c;display:inline-block;\"><\u002Fspan>Certifications<\u002Fdiv>\n    <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:clamp(1.8rem,3.4vw,2.4rem);font-weight:600;letter-spacing:-0.015em;line-height:1.15;color:#0f1e33;margin-bottom:2.5rem;max-width:26ch;\">Where the paper says the same thing the work does.<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:0.75rem;\">\n      <sc-for list=\"{{ certs }}\" as=\"cert\" hint-placeholder-count=\"8\">\n        <div style=\"background:#fff;padding:1rem 1.15rem;border:1px solid #dde4ee;border-radius:6px;display:flex;align-items:center;justify-content:space-between;gap:1rem;font-family:'IBM Plex Mono',monospace;font-size:0.82rem;color:#0f1e33;\">\n          <span>{{ cert.name }}<\u002Fspan>\n          <span style=\"font-size:0.62rem;letter-spacing:0.08em;color:{{ cert.statusColor }};\">{{ cert.status }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section id=\"contact\" data-reveal=\"\" style=\"padding:4.5rem 0;transition:opacity 0.7s ease-out, transform 0.7s ease-out;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:#1a4b8c;margin-bottom:0.75rem;display:flex;align-items:center;gap:0.75rem;\"><span style=\"width:24px;height:1px;background:#1a4b8c;display:inline-block;\"><\u002Fspan>Get in touch<\u002Fdiv>\n    <div style=\"background:#fff;border:1px solid #dde4ee;border-radius:10px;padding:3rem;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2.5rem;align-items:center;\">\n      <div>\n        <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:clamp(1.8rem,3.4vw,2.4rem);font-weight:600;letter-spacing:-0.015em;line-height:1.15;color:#0f1e33;margin-bottom:0.6rem;\">Let's talk.<\u002Fh2>\n        <p style=\"color:#34455e;max-width:45ch;\">I'm open to Principal Cloud / EUC Architect conversations, and to work at organizations building things that matter — infrastructure, security, or the mission itself.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:0.4rem;font-family:'IBM Plex Mono',monospace;font-size:0.85rem;\">\n        <sc-for list=\"{{ links }}\" as=\"l\" hint-placeholder-count=\"3\">\n          <a href=\"{{ l.href }}\" target=\"{{ l.target }}\" rel=\"noopener\" style=\"color:#1a4b8c;display:flex;align-items:center;gap:0.6rem;padding:0.45rem 0;\" style-hover=\"color:#ff6b3d;\">\n            <span style=\"color:#6b7a91;\">→<\u002Fspan>{{ l.label }}\n          <\u002Fa>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer style=\"padding:3rem 0 4rem;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:#6b7a91;letter-spacing:0.08em;\">\n    <div style=\"width:60px;height:1px;background:#c8d3e2;margin:0 auto 1.5rem;\"><\u002Fdiv>\n    Fitchburg, WI · yeoman.engineer\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n{{ lightboxNode }}\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{},&quot;showGrid&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Style&quot;},&quot;animateReveal&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;}}\">\nclass Component extends DCLogic {\n  componentDidMount() {\n    const animate = this.props.animateReveal ?? true;\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    const els = Array.from(document.querySelectorAll('[data-reveal]'));\n    if (!animate || reduce) { els.forEach(el => { el.style.opacity = '1'; el.style.transform = 'none'; }); return; }\n    const reveal = (el) => { el.style.opacity = '1'; el.style.transform = 'none'; };\n    els.forEach(el => { el.style.opacity = '0'; el.style.transform = 'translateY(16px)'; });\n    const io = new IntersectionObserver((entries) => {\n      entries.forEach(e => { if (e.isIntersecting) { reveal(e.target); io.unobserve(e.target); } });\n    }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });\n    els.forEach(el => io.observe(el));\n    // Fail-safe: reveal anything already on screen now, and force-reveal any stragglers\n    // in case the observer never fires (e.g. a host-controlled scroll container).\n    const revealVisible = () => {\n      const h = window.innerHeight || document.documentElement.clientHeight;\n      els.forEach(el => { const r = el.getBoundingClientRect(); if (r.top < h * 0.95 && r.bottom > 0) reveal(el); });\n    };\n    revealVisible();\n    setTimeout(revealVisible, 400);\n    this._revealFallback = setTimeout(() => { els.forEach(reveal); io.disconnect(); }, 1600);\n\n    document.querySelectorAll('[data-count]').forEach((el) => {\n      const raw = el.getAttribute('data-count') || '';\n      const m = raw.match(/^([\\d,]+)(.*)$/);\n      if (!m) return;\n      const target = parseInt(m[1].replace(/,/g, ''), 10);\n      const suffix = m[2];\n      const grp = m[1].includes(',');\n      const dur = 1200, start = performance.now();\n      const tick = (now) => {\n        const p = Math.min(1, (now - start) / dur);\n        const e = 1 - Math.pow(1 - p, 3);\n        const v = Math.round(target * e);\n        el.textContent = (grp ? v.toLocaleString('en-US') : String(v)) + suffix;\n        if (p < 1) requestAnimationFrame(tick);\n      };\n      requestAnimationFrame(tick);\n    });\n  }\n\n  state = { lightbox: null, lightboxTitle: '' };\n\n  _renderLightbox() {\n    const h = React.createElement;\n    return h('div', { onClick: () => this.setState({ lightbox: null }), style: { position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(15,30,51,0.82)', backdropFilter: 'blur(6px)', WebkitBackdropFilter: 'blur(6px)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '3vw', cursor: 'zoom-out' } },\n      h('div', { style: { maxWidth: '1100px', width: '100%', maxHeight: '92vh', display: 'flex', flexDirection: 'column', gap: '0.9rem' } },\n        h('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '1rem', fontFamily: \"'IBM Plex Mono',monospace\", fontSize: '0.78rem', letterSpacing: '0.06em', color: '#c8d3e2' } },\n          h('span', null, this.state.lightboxTitle),\n          h('span', { style: { opacity: 0.7 } }, 'click anywhere to close \\u2715')\n        ),\n        h('img', { src: this.state.lightbox, alt: this.state.lightboxTitle, style: { width: '100%', maxHeight: '84vh', objectFit: 'contain', borderRadius: '8px', border: '1px solid rgba(255,255,255,0.12)', boxShadow: '0 24px 60px rgba(0,0,0,0.45)', background: '#fff' } })\n      )\n    );\n  }\n\n  renderVals() {\n    return {\n      openLightbox: (e) => { const b = e.currentTarget; this.setState({ lightbox: b.getAttribute('data-img'), lightboxTitle: b.getAttribute('data-title') }); },\n      closeLightbox: () => this.setState({ lightbox: null }),\n      lightboxNode: this.state.lightbox ? this._renderLightbox() : null,\n      showGrid: this.props.showGrid ?? true,\n      stats: [\n        { value: '8,000+', label: 'Endpoints managed' },\n        { value: '600+', label: 'Win32 apps packaged' },\n        { value: '9', label: 'Sites' },\n        { value: '4→5', label: 'Promotions / 5 yrs' },\n      ],\n      caps: [\n        { num: '01 / Endpoint Management', title: 'Cloud-managed device fleets', body: 'Intune, Autopilot, Entra ID, Jamf. Zero-touch enrollment, compliance policy design, and lifecycle automation for Windows and macOS at scale.' },\n        { num: '02 / Automation', title: 'PowerShell, Graph, runbooks', body: 'Azure Automation, Power Automate, and Microsoft Graph. Building the systems that fix things without a ticket ever being opened.' },\n        { num: '03 / Internal tooling', title: 'SPFx, React, Power Platform', body: 'Self-service catalogs, approval flows, and internal apps that replace ticket queues with buttons employees can press themselves.' },\n        { num: '04 / Infrastructure', title: 'Azure, Linux, homelab-grade DIY', body: \"Docker, DNS, Tailscale, reverse proxies, Azure Automation. If it runs on Linux or in Azure, I've probably broken and rebuilt it in my own lab.\" },\n      ],\n      stops: [\n        { current: true, past: false, when: '2026 — Present', role: 'Senior EUC Engineer', where: 'Springs Window Fashions · Middleton, WI', body: 'Managing 3,500 Intune-enrolled endpoints across nine sites. Migrated the environment from fully manual on-prem management to fully automated cloud platforms (Intune, Autopilot, Jamf). Delivered a SPFx React self-service software catalog, a config-driven ITSM Service Catalog web part, and an Azure Automation \"prevention fleet\" runbook that auto-remediates proactive detections — all inside the first 90 days.', tags: ['Intune', 'Entra ID', 'SPFx / React', 'Azure Automation', 'Power Automate', 'Graph API'] },\n        { current: false, past: true, when: '2022 — 2026', role: 'EUC Engineer ', where: 'Sub-Zero Group · Madison, WI', body: 'Four years and four promotions from helpdesk to lead engineer. Built the endpoint platform largely from scratch and grew into the lead role across the stack — endpoint platforms, SharePoint, applications, and team leadership. Details in the projects below.', tags: ['Intune from zero', 'Autopilot', 'Jamf', 'PowerShell', 'SharePoint', 'ADCS'] },\n        { current: false, past: true, when: 'Earlier', role: 'Helpdesk ', where: 'Where the fundamentals were learned', body: 'The years that made the rest possible. Tickets, imaging benches, GPO rabbit holes, and the pattern-recognition that comes from seeing a thousand endpoints break in a thousand different ways.', tags: [] },\n      ],\n      projects: [\n        { num: '01', title: 'Self-service software catalog', img: 'assets/software-catalog.png', paras: ['Replaced a ticket-driven software request process with a SharePoint-native React catalog. Employees browse titles, request installs, and license groups auto-assign on approval. Tenant-agnostic and portable across sites.'], stack: 'SPFx · React · TypeScript · Power Automate · Graph' },\n        { num: '02', title: 'Proactive remediation \"prevention fleet\"', paras: ['An Azure Automation runbook wired to a SharePoint flags list. Two-pass architecture: trigger on-demand Intune remediations at scale, then harvest results. Fleet-level self-healing without human-in-the-loop.'], stack: 'Azure Automation · Graph API · PowerShell · SharePoint' },\n        { num: '03', title: 'Personal M365 dev environment', paras: ['A live Microsoft 365 tenant I own end-to-end — Entra ID P1, Intune, SharePoint, Exchange, and Azure — where I prototype and validate new configurations, PowerShell automation, and Intune policies before they touch production. Also serves as a sandbox for peers and adjacent teams to safely build hands-on skills.'], stack: 'M365 · Entra ID · Intune · Azure · SharePoint' },\n        { num: '04', title: 'Intune environment from zero', paras: ['Stood up cloud endpoint management from scratch across 4,500 devices. Autopilot enrollment, EAP-TLS certificate Wi-Fi via ADCS, and macOS zero-touch via Jamf. Migrated legacy SCCM-packaged apps into Intune and packaged 600+ new Win32 applications myself, establishing repeatable standards for detection rules, silent installers, and deployment rings.', 'Owned the full EUC surface end-to-end — endpoint platforms, SharePoint administration, and a broad application portfolio — while leading the EUC team and running on-demand training sessions to level up peers and adjacent teams.'], stack: 'Intune · Autopilot · Jamf · ADCS · SharePoint · PowerShell' },\n        { num: '05', title: 'ITSM service catalog web part', img: 'assets/itsm-catalog.png', paras: ['A React SPFx web part rendering an IT service catalog with drill-down tiles, status alerts, and quick links. Config-driven from five SharePoint lists — no HTML edits to change what the catalog shows.'], stack: 'SPFx 1.20 · React 17 · TypeScript · SharePoint' },\n        { num: '06', title: 'Homelab as second production', paras: ['A running lab across five hosts: Dell R720xd, Synology NAS, Raspberry Pi 5, and a workstation with local LLM inference. Pi-hole, Nginx Proxy Manager, Tailscale, WoL proxy, Open WebUI, self-hosted ARK cluster. The place I try things before I try them at work.'], stack: 'Docker · Linux · Tailscale · Ollama · DNS' },\n      ],\n      certs: [\n        { name: 'AZ-104', status: 'In Progress', statusColor: '#ff6b3d' },\n        { name: 'CCFE', status: 'Certified', statusColor: '#6b7a91' },\n        { name: 'CMFE', status: 'Certified', statusColor: '#6b7a91' },\n        { name: 'Network+', status: 'Certified', statusColor: '#6b7a91' },\n        { name: 'A+', status: 'Certified', statusColor: '#6b7a91' },\n        { name: 'CompTIA CSIS', status: 'Certified', statusColor: '#6b7a91' },\n        { name: 'CompTIA CIOS', status: 'Certified', statusColor: '#6b7a91' },\n        { name: 'LPI Linux Essentials', status: 'Certified', statusColor: '#6b7a91' },\n      ],\n      links: [\n        { href: 'mailto:andrew@yeoman.engineer', target: '_self', label: 'andrew@yeoman.engineer' },\n        { href: 'https://www.linkedin.com/in/andrew-yeoman', target: '_blank', label: 'linkedin.com/in/andrew-yeoman' },\n        { href: 'https://github.com/thediscovery-cmd', target: '_blank', label: 'github.com/thediscovery-cmd' },\n      ],\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
